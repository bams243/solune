<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,Segoe UI,Inter,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e0f1d"/><stop offset="1" stop-color="#0a0a14"/>
    </linearGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5ce1e6"/><stop offset="1" stop-color="#7c8cff"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.8" cy="0.15" r="0.6">
      <stop offset="0" stop-color="#7c8cff" stop-opacity="0.35"/><stop offset="1" stop-color="#7c8cff" stop-opacity="0"/>
    </radialGradient>
    <mask id="moon"><rect width="1200" height="630" fill="black"/><circle cx="980" cy="150" r="70" fill="white"/><circle cx="1010" cy="128" r="60" fill="black"/></mask>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <!-- mark: soleil + lune -->
  <circle cx="900" cy="170" r="30" fill="url(#acc)"/>
  <rect width="1200" height="630" fill="url(#acc)" mask="url(#moon)"/>
  <!-- texte -->
  <text x="90" y="250" fill="#eef1f7" font-size="92" font-weight="800" letter-spacing="-2">Solune</text>
  <text x="92" y="330" fill="#9aa3b8" font-size="40" font-weight="600">Ton assistant IA — voix, vision &amp; code</text>
  <text x="92" y="386" fill="#9aa3b8" font-size="40" font-weight="600">100% sur ton Mac.</text>
  <g transform="translate(92,470)">
    <rect width="430" height="62" rx="31" fill="none" stroke="#23263a" stroke-width="2"/>
    <circle cx="40" cy="31" r="6" fill="#46d6a0"/>
    <text x="64" y="40" fill="#cfd6e6" font-size="26" font-weight="600">100% local · zéro cloud · zéro abonnement</text>
  </g>
  <text x="92" y="582" fill="#5ce1e6" font-size="28" font-weight="700">« Hey Solune »</text>
</svg>
